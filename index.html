<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>呼叫中转页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .phone-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .phone-number {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin: 20px 0 10px;
            letter-spacing: 2px;
        }
        .call-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            margin: 20px 0;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .call-btn:active {
            transform: scale(0.96);
        }
        .note {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }
        .auto-redirect {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="phone-icon">??</div>
        <div class="phone-number" id="phoneNumber">加载中...</div>
        <button class="call-btn" id="callBtn">?? 立即呼叫</button>
        <p class="note">点击按钮将发起电话呼叫</p>
        <div class="auto-redirect" id="autoMsg"></div>
    </div>

    <script>
        // ===== 在这里修改你要拨打的号码 =====
        const TARGET_PHONE = "18659303173";
        // =================================

        const phoneSpan = document.getElementById('phoneNumber');
        const callBtn = document.getElementById('callBtn');
        const autoMsg = document.getElementById('autoMsg');

        // 显示号码（格式化）
        function formatPhone(phone) {
            if (phone.length === 11) {
                return phone.slice(0, 3) + ' ' + phone.slice(3, 7) + ' ' + phone.slice(7);
            }
            return phone;
        }

        phoneSpan.textContent = formatPhone(TARGET_PHONE);

        // 拨号函数
        function makeCall() {
            const telUrl = 'tel:' + TARGET_PHONE;
            window.location.href = telUrl;
        }

        // 绑定按钮点击事件
        callBtn.onclick = makeCall;

        // 自动检测环境并尝试自动跳转
        const userAgent = navigator.userAgent.toLowerCase();
        const isWechat = userAgent.indexOf('micromessenger') !== -1;
        const isAlipay = userAgent.indexOf('alipay') !== -1;

        if (isWechat) {
            autoMsg.innerHTML = '?? 检测到微信环境，请点击上方按钮，然后选择“允许”并使用浏览器打开';
            autoMsg.style.color = '#e74c3c';
        } else if (isAlipay) {
            autoMsg.innerHTML = '?? 检测到支付宝环境，点击按钮即可拨号';
        } else {
            // 普通浏览器：自动尝试跳转
            setTimeout(function() {
                makeCall();
                autoMsg.innerHTML = '?? 正在为你跳转到拨号... 如无反应，请点击上方按钮';
            }, 500);
        }
    </script>
</body>
</html>
